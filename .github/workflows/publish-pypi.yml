# Publish auditai to PyPI on version tags (vX.Y.Z) or manual dispatch.
#
# Preferred: Trusted Publishing (OIDC) — no long-lived token in GitHub.
# Setup: https://docs.pypi.org/trusted-publishers/
#   Project: auditai
#   Owner: iZenDeveloper  Repo: auditai
#   Workflow: publish-pypi.yml
#   Environment: pypi  (create empty GitHub Environment "pypi" optional but recommended)
#
# Fallback: repository secret PYPI_API_TOKEN (pypi-… API token, scope: entire account or project).

name: Publish PyPI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      testpypi:
        description: "Publish to TestPyPI instead of PyPI"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install -U build twine

      - name: Version gate (tag must match pyproject)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          test "$TAG" = "$VER" || { echo "tag v$TAG != pyproject version $VER"; exit 1; }

      - name: Build sdist + wheel
        run: python -m build

      - name: Twine check
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/auditai-cli/
    permissions:
      id-token: write # OIDC trusted publishing
      contents: read
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI (OIDC or token)
        if: ${{ inputs.testpypi == true }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # If trusted publisher not set, set password via secret:
          # password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          skip-existing: true

      - name: Publish to PyPI (OIDC preferred)
        if: ${{ inputs.testpypi != true }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Uncomment if not using Trusted Publishing:
          # password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
