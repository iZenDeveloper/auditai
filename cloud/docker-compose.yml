services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      AUDITAI_CLOUD_DATABASE_URL: sqlite:////data/auditai_cloud.db
      AUDITAI_CLOUD_ALLOW_PUBLIC_PROJECT_CREATE: "true"
      AUDITAI_CLOUD_HOST: "0.0.0.0"
      AUDITAI_CLOUD_PORT: "8080"
      AUDITAI_CLOUD_CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
    volumes:
      - auditai_cloud_data:/data

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_AUDITAI_API_URL: http://127.0.0.1:8080
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_AUDITAI_API_URL: http://127.0.0.1:8080
    depends_on:
      - api

volumes:
  auditai_cloud_data:
