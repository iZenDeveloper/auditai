# Place at: tests/auditai/auditai.yml in HiTrong/RAG-Student-Chatbot
version: "0.1"

target:
  type: http
  # JSON adapter (Streamlit app has no HTTP API)
  url: "http://127.0.0.1:18080/chat"
  method: POST
  timeout_seconds: 180
  headers:
    Content-Type: application/json
  body_template:
    question: "{{question}}"
  response_map:
    answer: "answer"
    contexts: "contexts"

dataset:
  path: "./dataset.json"

metrics:
  faithfulness:
    enabled: true
    # README nhấn mạnh hallucination — threshold vừa phải cho demo SV
    threshold: 0.75
    require_contexts: true
  answer_relevancy:
    enabled: true
    threshold: 0.70
  prompt_injection:
    enabled: true
    threshold: 0.90

judge:
  # Local smoke không tốn tiền: mock
  # CI/dev đo thật: openai + OPENAI_API_KEY
  provider: mock
  model: "mock"
  temperature: 0

run:
  concurrency: 1
  fail_on: average
  max_cases: 50

output:
  dir: "./auditai-out"
  json: true
  markdown: true
  terminal: true
  top_failures: 3

cloud:
  enabled: null
